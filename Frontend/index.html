<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>ShopVerse — Premium Fashion, Electronics & Home Essentials</title>
    <meta
      name="description"
      content="Discover premium fashion, electronics, and home essentials at ShopVerse. Free shipping above ₹999, easy 7-day returns, and 50,000+ happy customers."
    />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Canonical (replaced per-page by React Helmet when added later) -->
    <link rel="canonical" href="https://shopverse.in/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="ShopVerse" />
    <meta property="og:title"       content="ShopVerse — Premium Fashion, Electronics & Home Essentials" />
    <meta property="og:description" content="Discover premium fashion, electronics, and home essentials. Free shipping above ₹999." />
    <meta property="og:url"         content="https://shopverse.in/" />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&q=80" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ShopVerse — Premium Shopping" />
    <meta name="twitter:description" content="Premium fashion, electronics, and home essentials. Free shipping above ₹999." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&q=80" />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Preconnect to image CDN to reduce LCP for above-fold images -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Preload the hero image (LCP element) -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=900&q=85&auto=format&fit=crop"
      fetchpriority="high"
    />
  </head>
  <body>
    <!-- Skip navigation for keyboard users -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[9999]
             focus:px-4 focus:py-2 focus:rounded-lg focus:bg-white focus:text-gray-900
             focus:font-semibold focus:shadow-lg focus:outline-none"
    >
      Skip to main content
    </a>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
